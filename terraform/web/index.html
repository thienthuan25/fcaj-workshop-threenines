<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudCost Insight — Dashboard</title>
    <!-- Chart.js từ CDN để vẽ biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #f0f2f5;
            --text-color: #1a202c;
            --card-bg: #fff;
            --label-color: #718096;
            --heading-color: #2d3748;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --header-bg: linear-gradient(135deg, #232f3e, #ff9900);
        }

        body.dark-mode {
            --bg-color: #1a202c;
            --text-color: #ffffff;
            --card-bg: #2d3748;
            --label-color: #a0aec0;
            --heading-color: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 24px;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: var(--header-bg);
            color: #fff;
            padding: 20px 28px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        header h1 {
            font-size: 24px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
            margin-top: 4px;
        }

        .kpi-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px 24px;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .kpi-card .label {
            font-size: 13px;
            color: var(--label-color);
        }

        .kpi-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 6px;
        }

        .kpi-card .value.danger {
            color: #e53e3e;
        }

        .kpi-card .value.ok {
            color: #38a169;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--heading-color);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .chart-small {
            max-width: 850px;
            margin: 0 auto;
        }

        .status {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        @media (max-width: 900px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>☁️ CloudCost Insight</h1>
            <p>AWS Cost Monitoring &amp; Alert Dashboard — Near Real-Time</p>
        </div>
        <button id="theme-toggle">🌙</button>
    </header>

    <div id="status" class="status">Loading cost data...</div>

    <div id="content" style="display:none;">
        <!-- KPI -->
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="label">Total Cost (Period)</div>
                <div class="value" id="kpi-total">$0.00</div>
            </div>
            <div class="kpi-card">
                <div class="label">Alert Threshold/Day</div>
                <div class="value" id="kpi-threshold">$0.00</div>
            </div>
            <div class="kpi-card">
                <div class="label">Monitored Days</div>
                <div class="value" id="kpi-days">0</div>
            </div>
            <div class="kpi-card">
                <div class="label">Anomalous Days</div>
                <div class="value danger" id="kpi-anomalies">0</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="chart-grid">
            <div class="chart-card full-width">
                <h3>📈 Daily Cost Trend (Threshold Line + Anomaly Markers)</h3>
                <canvas id="trendChart" height="90"></canvas>
            </div>
            <div class="chart-card">
                <h3>🍩 Cost Share by Service</h3>
                <div class="chart-small">
                    <canvas id="serviceChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📊 Top Cost Services</h3>
                <canvas id="topChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // URL endpoint
        const API_ENDPOINT = "https://o7sny2mx5f.execute-api.us-east-1.amazonaws.com//costs";

        // Màu theo trạng thái
        const statusColor = (s) =>
            s === "CRITICAL" ? "#e53e3e" : s === "WARNING" ? "#dd6b20" : "#38a169";

        async function loadDashboard() {
            try {
                const res = await fetch(API_ENDPOINT);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();

                // Hiện nội dung, ẩn trạng thái tải
                document.getElementById("status").style.display = "none";
                document.getElementById("content").style.display = "block";

                // ===== KPI =====
                document.getElementById("kpi-total").textContent = "$" + data.grand_total.toFixed(2);
                document.getElementById("kpi-threshold").textContent = "$" + Number(data.threshold).toFixed(2);
                document.getElementById("kpi-days").textContent = data.days_count;
                const anomalies = data.daily_costs.filter(d => d.status !== "NORMAL").length;
                document.getElementById("kpi-anomalies").textContent = anomalies;

                const labels = data.daily_costs.map(d => d.date);
                const totals = data.daily_costs.map(d => d.total);
                const colors = data.daily_costs.map(d => statusColor(d.status));
                const threshold = Number(data.threshold);

                // ===== Biểu đồ xu hướng + đường ngưỡng + đánh dấu bất thường =====
                new Chart(document.getElementById("trendChart"), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [
                            {
                                label: "Daily Cost",
                                data: totals,
                                borderColor: "#3182ce",
                                backgroundColor: "rgba(49,130,206,0.1)",
                                fill: true,
                                tension: 0.3,
                                pointBackgroundColor: colors,   // tô màu điểm theo trạng thái
                                pointRadius: 5,
                            },
                            {
                                label: "Budget Threshold",
                                data: labels.map(() => threshold),
                                borderColor: "#e53e3e",
                                borderDash: [6, 4],
                                pointRadius: 0,
                                fill: false,
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: "top" },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        const label = context.dataset.label || "";
                                        let value = context.parsed.y;
                                        if (value === null || value === undefined) {
                                            value = context.parsed;
                                        }
                                        return label + ": $" + Number(value).toFixed(2);
                                    }
                                }
                            }
                        }
                    },
                });

                // ===== Biểu đồ tỷ trọng dịch vụ (donut) =====
                new Chart(document.getElementById("serviceChart"), {
                    type: "doughnut",
                    data: {
                        labels: data.top_services.map(s => s.service),
                        datasets: [{
                            data: data.top_services.map(s => s.cost),
                            backgroundColor: ["#ff9900", "#3182ce", "#38a169", "#e53e3e", "#805ad5", "#dd6b20", "#00a4a6", "#d53f8c", "#718096", "#2b6cb0"],
                        }],
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: "bottom"
                            },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        const label = context.label || "";
                                        const value = context.parsed;
                                        return label + ": $" + value.toFixed(2);
                                    }
                                }
                            }
                        }
                    },
                });

                // ===== Biểu đồ top dịch vụ (bar ngang) =====
                new Chart(document.getElementById("topChart"), {
                    type: "bar",
                    data: {
                        labels: data.top_services.map(s => s.service),
                        datasets: [{
                            label: "Cost ($)",
                            data: data.top_services.map(s => s.cost),
                            backgroundColor: "#ff9900",
                        }],
                    },
                    options: {
                        indexAxis: "y",
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        const label = context.dataset.label || "";
                                        let value = context.parsed.x;
                                        if (value === null || value === undefined) {
                                            value = context.parsed;
                                        }
                                        return label + ": $" + Number(value).toFixed(2);
                                    }
                                }
                            }
                        }
                    },
                });

            } catch (err) {
                document.getElementById("status").textContent =
                    "❌ Error loading data: " + err.message + ". Check the API_ENDPOINT again.";
            }
        }

        const themeToggle = document.getElementById("theme-toggle");
        themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            if (document.body.classList.contains("dark-mode")) {
                themeToggle.textContent = "☀️";
            } else {
                themeToggle.textContent = "🌙";
            }

            // Optionally update Chart.js global text colors
            Chart.defaults.color = document.body.classList.contains("dark-mode") ? "#ffffff" : "#666";
            // Re-render charts to apply text color changes
            Chart.instances.forEach(chart => chart.update());
        });

        loadDashboard();
    </script>
</body>

</html>
